name: CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.25"
  APP_PORT: "3000"

jobs:
  ci:
    name: CI (build/test/lint/security)
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: go test -tags=integration ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

      - name: Sonar (optional)
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}

  container:
    name: Container (lint/build/scan/push)
    runs-on: ubuntu-latest
    needs: [ci]
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: local/api-go:${{ github.sha }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: local/api-go:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Login to Docker Hub (optional)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image (optional)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/api-go:latest
            ${{ env.DOCKERHUB_USERNAME }}/api-go:${{ github.sha }}

  deploy_homolog:
    name: CD (homolog)
    runs-on: ubuntu-latest
    needs: [container]
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    environment: homolog
    env:
      RENDER_HOMOLOG_DEPLOY_HOOK: ${{ secrets.RENDER_HOMOLOG_DEPLOY_HOOK }}
      HOMOLOG_BASE_URL: ${{ secrets.HOMOLOG_BASE_URL }}

    steps:
      - name: Trigger Render deploy (optional)
        if: ${{ env.RENDER_HOMOLOG_DEPLOY_HOOK != '' }}
        run: curl -fsSL -X POST "${{ env.RENDER_HOMOLOG_DEPLOY_HOOK }}"

      - name: DAST (OWASP ZAP baseline) (optional)
        if: ${{ env.HOMOLOG_BASE_URL != '' }}
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.HOMOLOG_BASE_URL }}

  deploy_prod:
    name: CD (prod)
    runs-on: ubuntu-latest
    needs: [deploy_homolog]
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    environment: production
    env:
      RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
      PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}

    steps:
      - name: Trigger Render deploy (optional)
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK != '' }}
        run: curl -fsSL -X POST "${{ env.RENDER_PROD_DEPLOY_HOOK }}"

      - name: DAST (OWASP ZAP baseline) (optional)
        if: ${{ env.PROD_BASE_URL != '' }}
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.PROD_BASE_URL }}
